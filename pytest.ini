[pytest]
# The intent-engine repo's own tests live in ./tests. The merged dataset/
# subtree has its own ./dataset/tests, but those require the un-versioned raw/
# downloads (advbench, gtfobins, hf_injections, ...) to run the data-source
# normalization pipeline, so they are not collected by default. To run them:
#   cd dataset && <venv>/bin/python -m pytest
testpaths = tests
pythonpath = .
addopts = -q
filterwarnings =
  ignore::DeprecationWarning
